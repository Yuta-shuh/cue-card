<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Wooden pole shadow and pole -->
  <rect x="42" y="50" width="16" height="45" fill="#5c2d0c" rx="2" />
  <rect x="44" y="50" width="12" height="45" fill="#8B4513" rx="1" />
  
  <!-- Signboard background outer (frame) -->
  <rect x="10" y="8" width="80" height="64" fill="#d97706" rx="6" />
  
  <!-- Signboard inner panel -->
  <rect x="14" y="12" width="72" height="56" fill="#fef3c7" rx="4" />
  
  <!-- Letter C -->
  <text x="50" y="55" font-family="'Arial', sans-serif" font-weight="900" font-size="48" fill="#1e3a8a" text-anchor="middle">C</text>
  
  <!-- Little nails/screws -->
  <circle cx="20" cy="18" r="2.5" fill="#78350f" />
  <circle cx="80" cy="18" r="2.5" fill="#78350f" />
  <circle cx="20" cy="62" r="2.5" fill="#78350f" />
  <circle cx="80" cy="62" r="2.5" fill="#78350f" />
</svg>